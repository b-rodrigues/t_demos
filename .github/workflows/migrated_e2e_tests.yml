name: Migrated Tlang E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  repository_dispatch:
    types: [ trigger-demo ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        demo: [
          factor_roundtrip_t,
          arrow_interop_t,
          quarto_test_t,
          pmml_interchange_t,
          json_interchange_t,
          multi_deserializer_t,
          multi_lang_pipeline_t,
          polyglot_shell_t,
          labs_t,
          glm_examples_t
        ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrha1JzhBnXv7aWI6+F0=

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: rstats-on-nix

      - name: Get T commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.event.client_payload.repo }}"
          SHA="${{ github.event.client_payload.sha }}"
          if [[ -z "$SHA" || "$SHA" == "null" ]]; then
            REPO="b-rodrigues/tlang"
            SHA=$(gh api repos/b-rodrigues/tlang/commits/main --jq '.sha')
            echo "No dispatch payload, falling back to tlang/main: $SHA"
          fi
          echo "TLANG_REPO=$REPO" >> $GITHUB_ENV
          echo "TLANG_SHA=$SHA" >> $GITHUB_ENV

      - name: Update to latest T version
        working-directory: ./${{ matrix.demo }}
        run: |
          # 1. Update tproject.toml dependencies strategy
          nix shell "github:$TLANG_REPO/$TLANG_SHA" --command t update
          
          # 2. Run initial pass to ensure dependencies are resolved
          # For migrated tests, we use the explicit pipeline.t or similar
          # Standardized to pipeline.t in migration
          
          PIPELINE_FILE="pipeline.t"
          if [[ "${{ matrix.demo }}" == "labs_t" ]]; then
             PIPELINE_FILE="test_lab2_boston.t" # Just run one to verify deps
          elif [[ "${{ matrix.demo }}" == "glm_examples_t" ]]; then
             PIPELINE_FILE="test_glm_hsb.t"
          fi
          
          nix develop --command t run "$PIPELINE_FILE" || echo "Ignoring initial failure due to cold cache"
          
          # 3. Final update to lock everything
          nix shell "github:$TLANG_REPO/$TLANG_SHA" --command t update

      - name: Run Full Pipeline
        working-directory: ./${{ matrix.demo }}
        run: |
          if [[ "${{ matrix.demo }}" == "labs_t" ]]; then
            for f in test_lab*.t; do
              echo "--- Running $f ---"
              nix develop --command t run "$f"
            done
          elif [[ "${{ matrix.demo }}" == "glm_examples_t" ]]; then
            for f in test_glm_*.t test_titanic_glm.t; do
              echo "--- Running $f ---"
              nix develop --command t run "$f"
            done
          else
            nix develop --command t run pipeline.t
          fi
