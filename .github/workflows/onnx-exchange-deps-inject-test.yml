name: Demo ONNX Exchange T (Injection Failure Test)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  repository_dispatch:
    types: [ trigger-demo ]

jobs:
  onnx-exchange-deps-inject-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./onnx-exchange-deps-inject-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: rstats-on-nix

      - name: Get T commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.event.client_payload.repo }}"
          SHA="${{ github.event.client_payload.sha }}"
          if [[ -z "$SHA" || "$SHA" == "null" ]]; then
            REPO="b-rodrigues/tlang"
            SHA=$(gh api repos/b-rodrigues/tlang/commits/main --jq '.sha')
            echo "No dispatch payload, falling back to tlang/main: $SHA"
          fi
          echo "TLANG_REPO=$REPO" >> $GITHUB_ENV
          echo "TLANG_SHA=$SHA" >> $GITHUB_ENV

      - name: Update to latest T version
        run: |
          nix shell "github:$TLANG_REPO/$TLANG_SHA" --command t update

      - name: Inject pipeline dependencies (Expected Failure)
        env:
          TLANG_AUTO_ADD_PIPELINE_DEPS: "0"
        continue-on-error: true
        id: inject
        run: |
          nix develop --command t run src/pipeline.t

      - name: Verify failure and exit successfully
        run: |
          if [[ "${{ steps.inject.outcome }}" == "failure" ]]; then
            echo "Success: Dependency injection correctly failed with TLANG_AUTO_ADD_PIPELINE_DEPS=0"
          else
            echo "Failure: Dependency injection should have failed with TLANG_AUTO_ADD_PIPELINE_DEPS=0"
            exit 1
          fi

      - name: Show unchanged tproject.toml
        run: cat tproject.toml
