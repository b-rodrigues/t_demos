name: Test Error Recovery Demo

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  repository_dispatch:
    types: [ trigger-demo ]

jobs:
  test-error-recovery-t:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./error_recovery_t

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: rstats-on-nix

      - name: Get T commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.event.client_payload.repo }}"
          SHA="${{ github.event.client_payload.sha }}"
          if [[ -z "$SHA" || "$SHA" == "null" ]]; then
            REPO="b-rodrigues/tlang"
            SHA=$(gh api repos/b-rodrigues/tlang/commits/main --jq '.sha')
            echo "No dispatch payload, falling back to tlang/main: $SHA"
          fi
          echo "TLANG_REPO=$REPO" >> $GITHUB_ENV
          echo "TLANG_SHA=$SHA" >> $GITHUB_ENV

      - name: Update to latest T version
        run: |
          nix shell "github:$TLANG_REPO/$TLANG_SHA" --command t update
          if [ -f flake.nix ]; then
            sed -i "s|t-lang.url = \"github:b-rodrigues/tlang/[^\"]*\";|t-lang.url = \"github:$TLANG_REPO/$TLANG_SHA\";|" flake.nix
          fi

      - name: Inject pipeline dependencies
        env:
          TLANG_AUTO_ADD_PIPELINE_DEPS: "1"
        run: |
          nix develop --command t run src/pipeline.t || echo "Dependencies injected"

      - name: Run Pipeline (Populate and Build)
        run: |
          nix develop --command t run src/pipeline.t

      - name: Verify Recovery (handled_node should be 'Fallback Data')
        run: |
          echo "val = read_node('handled_node'); assert(val == 'Fallback Data', 'handled_node failed to recover')" > verify.t
          nix develop --command t run --unsafe verify.t

      - name: Verify Error Info
        run: |
          echo "val = read_node('error_info'); assert(val.failed == true, 'error_info should show failure')" > verify_info.t
          nix develop --command t run --unsafe verify_info.t
