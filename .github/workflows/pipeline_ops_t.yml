name: Demo Pipeline Ops T

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  repository_dispatch:
    types: [ trigger-demo ]

jobs:
  pipeline-ops-t:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pipeline_ops_t

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: rstats-on-nix

      - name: Generate flake.nix
        run: |
          nix shell github:b-rodrigues/tlang --command t update

      - name: Pin T to main branch for CI
        run: |
          sed -i 's|t-lang.url = "github:b-rodrigues/tlang/.*";|t-lang.url = "github:b-rodrigues/tlang/main";|' flake.nix

      - name: Run Pipeline (Populate and Build with Ops)
        run: |
          nix develop --command t run src/pipeline_ops.t

      - name: Inspect Built Nodes
        run: |
          echo "inspect_pipeline()" > inspect.t
          nix develop --command t run --unsafe inspect.t
