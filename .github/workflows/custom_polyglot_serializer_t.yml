name: Demo Custom Polyglot Serializer T

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  repository_dispatch:
    types: [ trigger-demo ]

jobs:
  custom-polyglot-serializer-t:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./custom_polyglot_serializer_t

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: rstats-on-nix

      - name: Update to specific Ref (PR/Branch)
        run: |
          TLANG_REF="${{ github.event.client_payload.ref || 'main' }}"
          echo "Using TLANG_REF: $TLANG_REF"
          nix shell "github:b-rodrigues/tlang/$TLANG_REF" --command t update
          sed -i "s|t-lang.url = \"github:b-rodrigues/tlang/.*\";|t-lang.url = \"github:b-rodrigues/tlang/$TLANG_REF\";|" flake.nix

      - name: Run Pipeline (Populate and Build)
        run: |
          nix develop --command t run src/pipeline.t

      - name: Inspect Built Nodes
        run: |
          echo "inspect_pipeline()" > inspect.t
          nix develop --command t run --unsafe inspect.t

      - name: Verify YAML Output
        run: |
          echo "read_node('config_r')" > view.t
          nix develop --command t run --unsafe view.t
