name: Demo Model Comparison T

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  repository_dispatch:
    types: [ trigger-demo ]

jobs:
  model-comparison-t:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./model_comparison_t

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org https://rstats-on-nix.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= rstats-on-nix.cachix.org-1:vdiiVgocg6WeJrODIqdprZRUrhi1JzhBnXv7aWI6+F0=

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: rstats-on-nix

      - name: Update to specific Ref (PR/Branch)
        run: |
          TLANG_REPO="${{ github.event.client_payload.repo || 'b-rodrigues/tlang' }}"
          TLANG_SHA="${{ github.event.client_payload.sha || 'main' }}"
          echo "Using TLANG_REPO: $TLANG_REPO"
          echo "Using TLANG_SHA: $TLANG_SHA"
          nix shell "github:$TLANG_REPO/$TLANG_SHA" --command t update
          sed -i "s|t-lang.url = \"github:b-rodrigues/tlang/.*\";|t-lang.url = \"github:$TLANG_REPO/$TLANG_SHA\";|" flake.nix

      - name: Run Pipeline (Populate and Build)
        run: |
          nix develop --command t run src/model_comparison.t

      - name: Inspect Built Nodes
        run: |
          echo "inspect_pipeline()" > inspect.t
          nix develop --command t run --unsafe inspect.t

      - name: Read Comparison Result Node
        run: |
          echo "read_node('comparison_result') |> print" > view.t
          nix develop --command t run --unsafe view.t
