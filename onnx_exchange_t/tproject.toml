[project]
name = "onnx_exchange_t"
description = "Train models in R and Python, exchange via ONNX, and predict in all runtimes."

[dependencies]
# T packages are auto-loaded

[r-dependencies]
packages = ["onnx", "dplyr"]

[py-dependencies]
version = "python313"
packages = ["onnx", "onnxruntime", "skl2onnx", "scikit-learn", "pandas", "numpy"]

[t]
min_version = "0.51.2"
